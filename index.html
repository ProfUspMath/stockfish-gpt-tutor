<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stockfish Gemini Chess Tutor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur px-6 py-4 flex flex-col lg:flex-row justify-between items-center gap-4 max-w-7xl w-full mx-auto">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-graduation-cap text-emerald-400 text-2xl"></i>
            <div>
                <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-emerald-400 to-teal-300 bg-clip-text text-transparent">
                    Stockfish Gemini Tutor
                </h1>
                <p class="text-xs text-slate-400">Análisis didáctico gratuito con Google Gemini y Stockfish</p>
            </div>
        </div>
        <!-- Configuración de API Key -->
        <div class="flex flex-col sm:flex-row items-center gap-2 w-full lg:w-auto">
            <input type="password" id="apiKeyInput" placeholder="Pega tu Google Gemini API Key" 
                   class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-emerald-500 w-full sm:w-64">
            <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="saveApiKey()" class="flex-1 sm:flex-initial bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-1.5 rounded-lg text-xs font-semibold transition-all shrink-0">
                    Guardar Key
                </button>
                <button onclick="scanAvailableModels()" class="flex-1 sm:flex-initial bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded-lg text-xs font-semibold transition-all shrink-0">
                    <i class="fa-solid fa-radar text-xs mr-1"></i> Escanear
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="flex-1 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 p-6 lg:p-12">
        
        <!-- Panel Izquierdo -->
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                <h2 class="text-base font-semibold mb-3 flex items-center gap-2 text-slate-200">
                    <i class="fa-solid fa-file-import text-emerald-400"></i> Cargar Partida (PGN)
                </h2>
                <textarea id="pgnInput" placeholder="1. e4 e5 2. Nf3 Nc6 3. Bb5..." 
                          class="w-full h-24 bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-slate-300 font-mono focus:outline-none focus:border-emerald-500 resize-none mb-3"></textarea>
                <button onclick="loadPgn()" class="w-full py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-xl text-xs transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-play"></i> Cargar y Sincronizar Tablero
                </button>
            </div>

            <!-- Tablero -->
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl flex flex-col items-center">
                <div id="myBoard" class="w-full max-w-[340px] rounded-lg overflow-hidden shadow-2xl border-4 border-slate-800"></div>
                
                <!-- Controles -->
                <div class="flex justify-center gap-4 mt-4 w-full">
                    <button onclick="prevMove()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs font-semibold transition-colors">
                        <i class="fa-solid fa-chevron-left"></i> Anterior
                    </button>
                    <button onclick="nextMove()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs font-semibold transition-colors">
                        Siguiente <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Panel Derecho -->
        <div class="lg:col-span-7">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 lg:p-8 shadow-xl h-full flex flex-col min-h-[450px]">
                <div class="flex justify-between items-center border-b border-slate-800 pb-4 mb-4">
                    <h2 class="text-lg font-bold flex items-center gap-2 text-slate-200">
                        <i class="fa-solid fa-chalkboard-user text-emerald-400"></i> Explicación del Tutor (Gemini)
                    </h2>
                    <div id="evalBadge" class="bg-slate-950 text-emerald-400 px-3 py-1 rounded-full text-xs font-mono border border-slate-800">
                        Eval: Estático
                    </div>
                </div>

                <!-- Selector de Modelo Manual -->
                <div id="selectorContainer" class="hidden mb-4 bg-slate-950 border border-slate-800 rounded-xl p-4">
                    <label for="modelSelect" class="block text-xs font-semibold text-indigo-400 mb-1.5">
                        <i class="fa-solid fa-robot mr-1"></i> Selecciona un modelo (si uno falla por alta demanda, cambia a otro):
                    </label>
                    <select id="modelSelect" onchange="changeModel(this.value)" class="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-indigo-500 cursor-pointer">
                        <!-- Se llena dinámicamente -->
                    </select>
                </div>

                <!-- Estado del análisis -->
                <div id="loading" class="hidden flex-1 flex-col items-center justify-center space-y-3">
                    <i class="fa-solid fa-spinner text-emerald-400 text-3xl animate-spin"></i>
                    <p class="text-xs text-slate-400">Analizando posición...</p>
                </div>

                <div id="placeholderText" class="flex-1 flex flex-col items-center justify-center text-slate-500 text-center p-8">
                    <i class="fa-solid fa-chess-knight text-5xl mb-4 opacity-20"></i>
                    <p class="text-xs">Navega por las jugadas. Haz clic en "Escanear" arriba para cargar los modelos disponibles de tu cuenta.</p>
                </div>

                <!-- Contenedor del Texto del Tutor -->
                <div id="tutorResponse" class="hidden flex-1 overflow-y-auto text-slate-300 text-sm leading-relaxed font-serif whitespace-pre-line max-h-[400px]">
                    <!-- Aquí se inyecta la respuesta -->
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        let board = null;
        let game = new Chess();
        let history = [];
        let currentIdx = -1;
        let detectedModel = null;

        $(document).ready(function() {
            board = Chessboard('myBoard', {
                position: 'start',
                draggable: false,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            
            const savedKey = localStorage.getItem('gemini_key');
            if (savedKey) {
                document.getElementById('apiKeyInput').value = savedKey;
                scanAvailableModels();
            }
        });

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if(!key) return alert('Por favor ingresa una clave válida.');
            localStorage.setItem('gemini_key', key);
            alert('¡Google Gemini API Key guardada localmente!');
            scanAvailableModels();
        }

        function changeModel(val) {
            detectedModel = val;
        }

        // ESCANER Y CREADOR DEL SELECTOR DE MODELOS
        async function scanAvailableModels() {
            const apiKey = localStorage.getItem('gemini_key') || document.getElementById('apiKeyInput').value.trim();
            if (!apiKey) return;

            const selectContainer = document.getElementById('selectorContainer');
            const modelSelect = document.getElementById('modelSelect');
            
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;
                const response = await fetch(url);
                const data = await response.json();

                if (response.ok && data.models) {
                    // Filtrar modelos válidos para generación de contenido
                    const textModels = data.models
                        .filter(m => m.supportedGenerationMethods.includes('generateContent'))
                        .map(m => m.name.replace('models/', ''));

                    if (textModels.length > 0) {
                        modelSelect.innerHTML = "";
                        textModels.forEach(model => {
                            // Marcar gemini-1.5-flash-8b o gemini-1.5-flash como preferidos por defecto
                            let selectedAttr = "";
                            if (model === "gemini-1.5-flash-8b") {
                                selectedAttr = "selected";
                                detectedModel = model;
                            } else if (!detectedModel && model === "gemini-1.5-flash") {
                                selectedAttr = "selected";
                                detectedModel = model;
                            }
                            modelSelect.innerHTML += `<option value="${model}" ${selectedAttr}>${model}</option>`;
                        });

                        if(!detectedModel) {
                            detectedModel = textModels[0];
                        }

                        selectContainer.classList.remove('hidden');
                    }
                } else {
                    console.error("Error al escanear modelos");
                }
            } catch (err) {
                console.error("Error de red al escanear:", err);
            }
        }

        function loadPgn() {
            const pgn = document.getElementById('pgnInput').value;
            if (!pgn) return alert('Por favor, introduce un PGN válido.');

            game = new Chess();
            if (!game.load_pgn(pgn)) {
                return alert('Error al leer el PGN. Verifica el formato.');
            }

            history = game.history({ verbose: true });
            currentIdx = history.length - 1;
            updateBoardToCurrent();
        }

        function updateBoardToCurrent() {
            const tempGame = new Chess();
            for (let i = 0; i <= currentIdx; i++) {
                tempGame.move(history[i]);
            }
            board.position(tempGame.fen());
            analyzePosition(tempGame.fen(), history[currentIdx] ? history[currentIdx].san : 'Posición Inicial');
        }

        function prevMove() {
            if (currentIdx > -1) {
                currentIdx--;
                updateBoardToCurrent();
            }
        }

        function nextMove() {
            if (currentIdx < history.length - 1) {
                currentIdx++;
                updateBoardToCurrent();
            }
        }

        async function analyzePosition(fen, lastMove) {
            const apiKey = localStorage.getItem('gemini_key');
            if (!apiKey) {
                document.getElementById('placeholderText').innerHTML = `
                    <i class="fa-solid fa-key text-amber-500 text-3xl mb-2"></i>
                    <p class="text-xs text-amber-400">Guarda tu Google Gemini API Key arriba para recibir el análisis.</p>
                `;
                return;
            }

            if (!detectedModel) {
                document.getElementById('placeholderText').innerHTML = `
                    <i class="fa-solid fa-triangle-exclamation text-rose-500 text-3xl mb-2"></i>
                    <p class="text-xs text-rose-400">No se ha detectado ningún modelo compatible. Haz clic en "Escanear" arriba.</p>
                `;
                return;
            }

            document.getElementById('placeholderText').classList.add('hidden');
            document.getElementById('tutorResponse').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                // 1. Obtener datos de Stockfish de Lichess
                const lichessUrl = `https://lichess.org/api/cloud-eval?fen=${encodeURIComponent(fen)}`;
                const response = await fetch(lichessUrl);
                let stockfishData = "No disponible en la nube de Lichess";
                let evaluation = "0.0";

                if (response.ok) {
                    const data = await response.json();
                    evaluation = data.pvs && data.pvs[0] ? (data.pvs[0].cp / 100).toFixed(2) : "Mate o ventaja decisiva";
                    stockfishData = `Evaluación: ${evaluation}. Mejores jugadas sugeridas por Stockfish: ${data.pvs ? data.pvs.map(p => p.moves).join(', ') : 'N/A'}`;
                    document.getElementById('evalBadge').innerText = `Eval Stockfish: ${evaluation}`;
                } else {
                    document.getElementById('evalBadge').innerText = `Eval: Local`;
                    stockfishData = "Stockfish no tiene esta posición precalculada en Lichess.";
                }

                // 2. Prompt de Ajedrez
                const prompt = `Eres un tutor de ajedrez muy didáctico. Explica el movimiento jugado: "${lastMove}". 
                La posición actual en FEN es: "${fen}".
                La evaluación de Stockfish es: "${stockfishData}".
                Explica por qué ese movimiento es bueno o malo, qué planes abre y qué conceptos enseña. Sé breve e instructivo (máximo 2 párrafos).`;

                // 3. Consulta al modelo seleccionado
                const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${detectedModel}:generateContent?key=${apiKey}`;
                
                const geminiResponse = await fetch(geminiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const geminiData = await geminiResponse.json();

                if (geminiResponse.ok && geminiData.candidates && geminiData.candidates[0].content) {
                    const explanation = geminiData.candidates[0].content.parts[0].text;
                    document.getElementById('tutorResponse').innerText = explanation;
                    document.getElementById('tutorResponse').classList.remove('hidden');
                } else {
                    let errMsg = geminiData.error ? geminiData.error.message : "Error desconocido.";
                    throw new Error(errMsg);
                }

            } catch (error) {
                console.error(error);
                document.getElementById('tutorResponse').innerText = `Error con el modelo "${detectedModel}":\n\n${error.message}\n\n💡 RECOMENDACIÓN: El modelo seleccionado está saturado. Por favor, selecciona otro modelo en la lista de arriba y vuelve a intentarlo.`;
                document.getElementById('tutorResponse').classList.remove('hidden');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
